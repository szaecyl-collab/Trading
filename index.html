<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>TRADING 2026</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; }

.wrapper { display:flex; justify-content:space-between; }

/* CALENDARIO */
.year {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
  width:60%;
}

.month {
  border:2px solid #000;
  background:white;
  font-size:12px;
}

.month-title {
  background:#ddd;
  text-align:center;
  font-weight:bold;
  padding:3px;
}

.grid {
  display:grid;
  grid-template-columns: repeat(8,1fr);
}

.cell {
  border:1px solid #999;
  height:25px;
  text-align:center;
  line-height:25px;
}

.header { background:#eee; font-weight:bold; }

.friday { background:#cfe2ff; cursor:pointer; }

.cap { background:#fff; font-size:11px; }

/* GRAFICO */
.chart-container {
  width:35%;
  background:#2c2c2c;
  padding:20px;
  border-radius:10px;
}
</style>
</head>

<body>

<h2>TRADING 2026</h2>

<div class="wrapper">
  <div class="year" id="calendar"></div>

  <div class="chart-container">
    <canvas id="chart"></canvas>
  </div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("capData")) || {};
let year = 2026;

const months = [
"enero","febrero","marzo","abril","mayo","junio",
"julio","agosto","septiembre","octubre","noviembre","diciembre"
];

const days = ["L","M","X","J","V","S","D","CAP"];

function createCalendar(){
  const cal=document.getElementById("calendar");
  cal.innerHTML="";

  months.forEach((month, m)=>{
    let div=document.createElement("div");
    div.className="month";

    let title=document.createElement("div");
    title.className="month-title";
    title.innerText=month+" "+year;
    div.appendChild(title);

    let grid=document.createElement("div");
    grid.className="grid";

    // cabecera
    days.forEach(d=>{
      let c=document.createElement("div");
      c.className="cell header";
      c.innerText=d;
      grid.appendChild(c);
    });

    let firstDay=(new Date(year,m,1).getDay()+6)%7;
    let daysInMonth=new Date(year,m+1,0).getDate();

    let row=[];
    for(let i=0;i<firstDay;i++) row.push("");

    for(let d=1;d<=daysInMonth;d++) row.push(d);

    while(row.length%7!==0) row.push("");

    for(let i=0;i<row.length;i+=7){
      let week=row.slice(i,i+7);

      week.forEach((d,idx)=>{
        let cell=document.createElement("div");
        cell.className="cell";

        if(d){
          cell.innerText=d;

          let date=new Date(year,m,d);

          if(date.getDay()===5){
            cell.classList.add("friday");

            let key=`${m+1}-${d}`;
            if(data[key]){
              cell.innerHTML=d+"<br>"+data[key];
            }

            cell.onclick=()=>{
              let val=prompt("Capital:",data[key]||"");
              if(val){
                data[key]=parseFloat(val);
                localStorage.setItem("capData",JSON.stringify(data));
                location.reload();
              }
            };
          }
        }

        grid.appendChild(cell);
      });

      // columna CAP
      let capCell=document.createElement("div");
      capCell.className="cell cap";

      let friday=week.find(d=>{
        let dt=new Date(year,m,d);
        return dt.getDay()===5;
      });

      if(friday){
        let key=`${m+1}-${friday}`;
        if(data[key]) capCell.innerText=data[key];
      }

      grid.appendChild(capCell);
    }

    div.appendChild(grid);
    cal.appendChild(div);
  });
}

/* GRAFICO */
function buildChart(){
  let labels=[];
  let values=[];
  let last=null;

  for(let m=1;m<=12;m++){
    for(let d=1;d<=31;d++){
      let key=`${m}-${d}`;
      if(data[key]) last=data[key];
      labels.push(`${m}/${d}`);
      values.push(last);
    }
  }

  new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"CAPITAL",
        data:values,
        borderColor:"#4da3ff",
        fill:false
      }]
    },
    options:{
      plugins:{legend:{labels:{color:"white"}}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{ticks:{color:"white"}}
      }
    }
  });
}

createCalendar();
buildChart();
</script>

</body>
</html>
