<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trading Calendar PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; }

.topbar { margin:10px; }

#tabs { display:flex; gap:5px; margin:10px; }

.tab {
  padding:5px 10px;
  background:#ddd;
  cursor:pointer;
  border:1px solid #999;
}

.active-tab {
  background:#fff;
  font-weight:bold;
}

.month {
  border:2px solid #000;
  background:white;
  font-size:11px;
}

.month-title {
  background:#ddd;
  text-align:center;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns: repeat(8,1fr);
}

.cell {
  border:1px solid #999;
  height:24px;
  text-align:center;
  line-height:24px;
}

.header { background:#eee; font-weight:bold; }

.friday { background:#cfe2ff; cursor:pointer; }

.chart-box {
  margin-top:30px;
  background:#2c2c2c;
  padding:15px;
}

canvas {
  width:100% !important;
  height:300px !important;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="settings()">⚙️ Config</button>
<button onclick="window.print()">🖨️ Imprimir</button>
</div>

<div id="tabs"></div>

<h2 id="title"></h2>

<div id="calendar"></div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<script>
let state = JSON.parse(localStorage.getItem("vertexApp")) || {
  active:"Principal",
  portfolios:{
    "Principal":{
      year:2026,
      start:1000,
      target:5000,
      data:{}
    }
  }
};

function current(){ return state.portfolios[state.active]; }
function save(){ localStorage.setItem("vertexApp", JSON.stringify(state)); }

/* TABS */
function buildTabs(){
  let tabs=document.getElementById("tabs");
  tabs.innerHTML="";

  Object.keys(state.portfolios).forEach(name=>{
    let tab=document.createElement("div");
    tab.className="tab";
    if(name===state.active) tab.classList.add("active-tab");

    tab.innerText=name;

    tab.onclick=()=>{
      state.active=name;
      save();
      render();
    };

    tabs.appendChild(tab);
  });
}

/* CALENDARIO SIMPLE */
function buildCalendar(){
  let cal=document.getElementById("calendar");
  cal.innerHTML="";

  let p=current();
  document.getElementById("title").innerText=p.year;

  for(let m=0;m<12;m++){
    let div=document.createElement("div");
    div.innerHTML="<b>Mes "+(m+1)+"</b>";
    cal.appendChild(div);
  }
}

/* 🔥 NUEVA GRAFICA LIMPIA */
function buildChart(){

  let p=current();

  let labels=[];
  let values=[];
  let last=p.start || 0;

  for(let m=1;m<=12;m++){
    let days=new Date(p.year,m,0).getDate();

    for(let d=1;d<=days;d++){

      let key=`${m}-${d}`;

      if(p.data[key]){
        last = p.data[key];
      }

      labels.push(m+"/"+d);
      values.push(last);
    }
  }

  let ctx = document.getElementById("chart").getContext("2d");

  if(window.chart) window.chart.destroy();

  window.chart = new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"Equity",
        data:values,
        borderColor:"#4da3ff",
        tension:0.1
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false
    }
  });

}

/* CONFIG */
function settings(){
  let p=current();
  let start=prompt("Capital inicial:",p.start);
  if(start) p.start=parseFloat(start);

  save();
  render();
}

/* RENDER */
function render(){
  buildTabs();
  buildCalendar();
  buildChart();
}

render();
</script>

</body>
</html>
