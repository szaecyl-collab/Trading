<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trading Calendar PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; }

.topbar { margin:10px; }

/* TABS */
#tabs { display:flex; gap:5px; margin:10px; }

.tab {
  padding:5px 10px;
  background:#ddd;
  cursor:pointer;
  border:1px solid #999;
}

.active-tab {
  background:#fff;
  font-weight:bold;
}

.tab-close {
  margin-left:5px;
  color:red;
  cursor:pointer;
}

/* CALENDARIO */
.year {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

.month {
  border:2px solid #000;
  background:white;
  font-size:11px;
}

.month-title {
  background:#ddd;
  text-align:center;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns: repeat(8,1fr);
}

.cell {
  border:1px solid #999;
  height:24px;
  text-align:center;
  line-height:24px;
}

.header { background:#eee; font-weight:bold; }

.friday { background:#cfe2ff; cursor:pointer; }

.capcol { font-size:10px; }

/* GRAFICA */
.chart-box {
  margin-top:30px;
  background:#2c2c2c;
  padding:15px;
  height:300px;
}

button { margin:5px; }
</style>
</head>

<body>

<div class="topbar">
<button onclick="settings()">⚙️ Config</button>
<button onclick="exportData()">📤 Exportar</button>
<button onclick="importData()">📥 Importar</button>
<button onclick="window.print()">🖨️ Imprimir</button>
</div>

<div id="tabs"></div>

<h2 id="title"></h2>

<div class="year" id="calendar"></div>

<div class="chart-box">
<canvas id="chart" style="height:300px;"></canvas>
</div>

<script>
let state = JSON.parse(localStorage.getItem("vertexApp")) || {
  active:"Principal",
  portfolios:{
    "Principal":{
      year:2026,
      start:1000,
      target:5000,
      data:{}
    }
  }
};

function current(){ return state.portfolios[state.active]; }
function save(){ localStorage.setItem("vertexApp", JSON.stringify(state)); }

/* TABS */
function buildTabs(){
  let tabs=document.getElementById("tabs");
  tabs.innerHTML="";

  Object.keys(state.portfolios).forEach(name=>{
    let tab=document.createElement("div");
    tab.className="tab";
    if(name===state.active) tab.classList.add("active-tab");

    tab.innerHTML=name;

    tab.onclick=()=>{
      state.active=name;
      save();
      render();
    };

    let close=document.createElement("span");
    close.innerText=" ×";
    close.className="tab-close";

    close.onclick=(e)=>{
      e.stopPropagation();

      if(confirm("Eliminar cartera?")){
        delete state.portfolios[name];
        state.active=Object.keys(state.portfolios)[0];
        save();
        render();
      }
    };

    tab.appendChild(close);
    tabs.appendChild(tab);
  });

  let add=document.createElement("div");
  add.className="tab";
  add.innerText="+";

  add.onclick=()=>{
    newPortfolio();
  };

  tabs.appendChild(add);
}

/* CALENDARIO */
const months=["enero","febrero","marzo","abril","mayo","junio",
"julio","agosto","septiembre","octubre","noviembre","diciembre"];

const days=["L","M","X","J","V","S","D","CAP"];

function buildCalendar(){
  let cal=document.getElementById("calendar");
  cal.innerHTML="";

  let p=current();
  document.getElementById("title").innerText=state.active+" - "+p.year;

  months.forEach((month,m)=>{

    let box=document.createElement("div");
    box.className="month";

    let title=document.createElement("div");
    title.className="month-title";
    title.innerText=month+" "+p.year;
    box.appendChild(title);

    let grid=document.createElement("div");
    grid.className="grid";

    days.forEach(d=>{
      let c=document.createElement("div");
      c.className="cell header";
      c.innerText=d;
      grid.appendChild(c);
    });

    let first=(new Date(p.year,m,1).getDay()+6)%7;
    let daysInMonth=new Date(p.year,m+1,0).getDate();

    let arr=[];
    for(let i=0;i<first;i++) arr.push("");
    for(let d=1;d<=daysInMonth;d++) arr.push(d);
    while(arr.length%7!==0) arr.push("");

    for(let i=0;i<arr.length;i+=7){
      let week=arr.slice(i,i+7);

      week.forEach(d=>{
        let cell=document.createElement("div");
        cell.className="cell";

        if(d){
          cell.innerText=d;
          let date=new Date(p.year,m,d);

          if(date.getDay()===5){
            cell.classList.add("friday");

            let key=`${m+1}-${d}`;

            if(p.data[key]){
              cell.innerHTML=d+"<br>"+p.data[key];
            }

            cell.onclick=()=>{
              let val=prompt("Capital:",p.data[key]||"");
              if(val){
                p.data[key]=parseFloat(val);
                save();
                render();
              }
            };
          }
        }

        grid.appendChild(cell);
      });

      let cap=document.createElement("div");
      cap.className="cell capcol";

      let friday=week.find(d=>{
        if(!d) return false;
        let dt=new Date(p.year,m,d);
        return dt.getDay()===5;
      });

      if(friday){
        let key=`${m+1}-${friday}`;
        if(p.data[key]) cap.innerText=p.data[key];
      }

      grid.appendChild(cap);
    }

    box.appendChild(grid);
    cal.appendChild(box);
  });
}

/* GRAFICA */
function buildChart(){
  let p=current();

  let labels=[];
  let values=[];
  let last=p.start || 0;

  for(let m=1;m<=12;m++){
    let days=new Date(p.year,m,0).getDate();

    for(let d=1;d<=days;d++){
      let key=`${m}-${d}`;

      if(p.data[key] !== undefined && !isNaN(p.data[key])){
        last=p.data[key];
      }

      labels.push(`${m}/${d}`);
      values.push(last);
    }
  }

  if(window.chart) window.chart.destroy();

  window.chart=new Chart(document.getElementById("chart"),{
    type:"line",
    data:{
      labels:labels,
      datasets:[
        {
          label:"Equity",
          data:values,
          borderColor:"#4da3ff",
          fill:false
        },
        {
          label:"Objetivo",
          data:Array(values.length).fill(p.target),
          borderColor:"orange",
          borderDash:[5,5],
          fill:false
        }
      ]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{labels:{color:"white"}}},
      scales:{
        x:{ticks:{color:"white"}},
        y:{
          ticks:{
            color:"white",
            callback:value => value + " €"
          }
        }
      }
    }
  });
}

/* CONFIG */
function settings(){
  let p=current();
  let year=prompt("Año:",p.year);
  let start=prompt("Capital inicial:",p.start);
  let target=prompt("Objetivo:",p.target);

  if(year) p.year=parseInt(year);
  if(start) p.start=parseFloat(start);
  if(target) p.target=parseFloat(target);

  save();
  render();
}

function newPortfolio(){
  let name=prompt("Nombre cartera:");
  if(!name) return;

  state.portfolios[name]={
    year:2026,
    start:1000,
    target:5000,
    data:{}
  };

  state.active=name;
  save();
  render();
}

/* EXPORT / IMPORT */
function exportData(){
  let blob=new Blob([JSON.stringify(state)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="trading_data.json";
  a.click();
}

function importData(){
  let input=document.createElement("input");
  input.type="file";
  input.onchange=e=>{
    let file=e.target.files[0];
    let reader=new FileReader();
    reader.onload=()=>{
      state=JSON.parse(reader.result);
      save();
      render();
    };
    reader.readAsText(file);
  };
  input.click();
}

/* RENDER */
function render(){
  buildTabs();
  buildCalendar();
  buildChart();
}

render();
</script>

</body>
</html>
