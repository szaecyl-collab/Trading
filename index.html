<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trading Calendar</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; text-align: center; }
.calendar {
  display: grid;
  grid-template-columns: repeat(7, 1fr);
  gap: 5px;
  max-width: 700px;
  margin: auto;
}
.day {
  border: 1px solid #ccc;
  padding: 10px;
  cursor: pointer;
}
.filled { background: #c8e6ff; }
</style>
</head>
<body>

<h2>Calendario Trading</h2>

<div class="calendar" id="calendar"></div>

<h3>Gráfica de Equity</h3>
<canvas id="chart" height="100"></canvas>

<script>
let data = JSON.parse(localStorage.getItem("calendarData")) || {};

const calendar = document.getElementById("calendar");

// Crear calendario simple (1–31)
for (let i = 1; i <= 31; i++) {
    let div = document.createElement("div");
    div.className = "day";
    div.innerHTML = "<b>" + i + "</b>";

    if (data[i]) {
        div.innerHTML += "<br>" + data[i] + "€";
        div.classList.add("filled");
    }

    div.onclick = () => {
        let value = prompt("Nivel de cuenta (€):", data[i] || "");
        if (value !== null && value !== "") {
            data[i] = parseFloat(value);
            localStorage.setItem("calendarData", JSON.stringify(data));
            location.reload();
        }
    };

    calendar.appendChild(div);
}

// 📈 GRÁFICA CONTINUA (CLAVE)
function buildChartData() {
    let labels = [];
    let values = [];

    let lastValue = null;

    for (let i = 1; i <= 31; i++) {
        labels.push(i);

        if (data[i]) {
            lastValue = data[i];
        }

        values.push(lastValue);
    }

    return { labels, values };
}

function drawChart() {
    let ctx = document.getElementById("chart").getContext("2d");

    let chartData = buildChartData();

    new Chart(ctx, {
        type: 'line',
        data: {
            labels: chartData.labels,
            datasets: [{
                label: 'Equity',
                data: chartData.values,
                fill: false,
                spanGaps: true
            }]
        }
    });
}

drawChart();
</script>

</body>
</html>
