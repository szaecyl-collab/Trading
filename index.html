<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trading Calendar PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; margin:0; }

/* TOPBAR */
.topbar {
  padding:10px;
  background:#222;
  color:white;
}

button { margin:3px; }

/* TABS */
#tabs {
  display:flex;
  gap:5px;
  padding:10px;
  background:#ddd;
}

.tab {
  padding:6px 12px;
  background:#bbb;
  cursor:pointer;
}

.active {
  background:white;
  font-weight:bold;
}

/* CALENDARIO */
.year {
  display:grid;
  grid-template-columns: repeat(3,1fr);
  gap:10px;
  padding:10px;
}

.month {
  background:white;
  border:1px solid #000;
  font-size:11px;
}

.month-title {
  background:#ddd;
  text-align:center;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns: repeat(7,1fr);
}

.cell {
  border:1px solid #ccc;
  height:24px;
  text-align:center;
  line-height:24px;
  cursor:pointer;
}

.pos { background:#c8f7c5; }
.neg { background:#f7c5c5; }

/* GRAFICA */
.chart-box {
  height:300px;
  padding:10px;
  background:#222;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="newPortfolio()">➕ Nueva cartera</button>
<button onclick="config()">⚙️ Config</button>
<button onclick="exportGlobal()">📤 Exportar TODO</button>
<button onclick="importGlobal()">📥 Importar TODO</button>
</div>

<div id="tabs"></div>

<div class="year" id="calendar"></div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<script>

/* ====== ESTADO ====== */
let state = JSON.parse(localStorage.getItem("tradeApp")) || {
  active:"Principal",
  portfolios:{
    "Principal":{
      year:2026,
      start:1000,
      data:{}
    }
  }
};

function save(){
  localStorage.setItem("tradeApp", JSON.stringify(state));
}

function current(){
  return state.portfolios[state.active];
}

/* ====== TABS ====== */
function buildTabs(){
  let tabs=document.getElementById("tabs");
  tabs.innerHTML="";

  Object.keys(state.portfolios).forEach(name=>{
    let t=document.createElement("div");
    t.className="tab";
    if(name===state.active) t.classList.add("active");
    t.innerText=name;

    t.onclick=()=>{
      state.active=name;
      save();
      render();
    };

    tabs.appendChild(t);
  });

  let add=document.createElement("div");
  add.className="tab";
  add.innerText="+";
  add.onclick=newPortfolio;
  tabs.appendChild(add);
}

/* ====== CALENDARIO ====== */
const months=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];

function buildCalendar(){
  let cal=document.getElementById("calendar");
  cal.innerHTML="";

  let p=current();

  months.forEach((m,mi)=>{

    let box=document.createElement("div");
    box.className="month";

    let title=document.createElement("div");
    title.className="month-title";
    title.innerText=m+" "+p.year;
    box.appendChild(title);

    let grid=document.createElement("div");
    grid.className="grid";

    let days=new Date(p.year,mi+1,0).getDate();

    for(let d=1;d<=days;d++){

      let cell=document.createElement("div");
      cell.className="cell";

      let key=`${mi+1}-${d}`;
      let val=p.data[key];

      cell.innerHTML=d;

      if(val){
        cell.innerHTML += "<br>"+val;
        if(val>0) cell.classList.add("pos");
        if(val<0) cell.classList.add("neg");
      }

      cell.onclick=()=>{
        let v=prompt("Resultado (€):",val||"");
        if(v!==null){
          p.data[key]=parseFloat(v);
          save();
          render();
        }
      };

      grid.appendChild(cell);
    }

    box.appendChild(grid);
    cal.appendChild(box);
  });
}

/* ====== GRAFICA (equity real) ====== */
function buildChart(){

  let p=current();

  let labels=[];
  let values=[];

  let equity=p.start;

  for(let m=0;m<12;m++){
    let days=new Date(p.year,m+1,0).getDate();

    for(let d=1;d<=days;d++){
      let key=`${m+1}-${d}`;

      if(p.data[key]!==undefined){
        equity += p.data[key];
        labels.push(`${m+1}/${d}`);
        values.push(equity);
      }
    }
  }

  let ctx=document.getElementById("chart").getContext("2d");

  if(window.chart) window.chart.destroy();

  setTimeout(()=>{

    window.chart=new Chart(ctx,{
      type:"line",
      data:{
        labels:labels,
        datasets:[{
          label:"Equity",
          data:values,
          borderColor:"#4da3ff",
          tension:0.2,
          pointRadius:3
        }]
      },
      options:{
        responsive:true,
        maintainAspectRatio:false,
        animation:false,
        plugins:{
          legend:{ labels:{ color:"white" } }
        },
        scales:{
          x:{ ticks:{ color:"white" } },
          y:{ ticks:{ color:"white" } }
        }
      }
    });

  },50);
}

/* ====== CONFIG ====== */
function config(){
  let p=current();

  let y=prompt("Año:",p.year);
  let s=prompt("Capital inicial:",p.start);

  if(y) p.year=parseInt(y);
  if(s) p.start=parseFloat(s);

  save();
  render();
}

/* ====== CARTERAS ====== */
function newPortfolio(){
  let name=prompt("Nombre cartera:");
  if(!name) return;

  state.portfolios[name]={
    year:2026,
    start:1000,
    data:{}
  };

  state.active=name;
  save();
  render();
}

/* ====== EXPORT / IMPORT ====== */
function exportGlobal(){
  let blob=new Blob([JSON.stringify(state)],{type:"application/json"});
  let a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="trading_all.json";
  a.click();
}

function importGlobal(){
  let input=document.createElement("input");
  input.type="file";
  input.onchange=e=>{
    let file=e.target.files[0];
    let r=new FileReader();
    r.onload=()=>{
      state=JSON.parse(r.result);
      save();
      render();
    };
    r.readAsText(file);
  };
  input.click();
}

/* ====== RENDER ====== */
function render(){
  buildTabs();
  buildCalendar();
  buildChart();
}

render();

</script>

</body>
</html>
