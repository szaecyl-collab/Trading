<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trading Calendar PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body { font-family: Arial; background:#f5f5f5; }

.topbar { margin:10px; }

#tabs { display:flex; gap:5px; margin:10px; }

.tab {
  padding:5px 10px;
  background:#ddd;
  cursor:pointer;
  border:1px solid #999;
}

.active-tab {
  background:#fff;
  font-weight:bold;
}

.year {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  gap:10px;
}

.month {
  border:2px solid #000;
  background:white;
  font-size:11px;
}

.month-title {
  background:#ddd;
  text-align:center;
  font-weight:bold;
}

.grid {
  display:grid;
  grid-template-columns: repeat(8,1fr);
}

.cell {
  border:1px solid #999;
  height:24px;
  text-align:center;
  line-height:24px;
}

.header { background:#eee; font-weight:bold; }

.friday { background:#cfe2ff; cursor:pointer; }

.chart-box {
  margin-top:30px;
  background:#2c2c2c;
  padding:15px;
}

canvas {
  width:100% !important;
  height:300px !important;
}
</style>
</head>

<body>

<div class="topbar">
<button onclick="settings()">⚙️ Config</button>
<button onclick="window.print()">🖨️ Imprimir</button>
</div>

<div id="tabs"></div>

<h2 id="title"></h2>

<div class="year" id="calendar"></div>

<div class="chart-box">
<canvas id="chart"></canvas>
</div>

<script>
let state = JSON.parse(localStorage.getItem("vertexApp")) || {
  active:"Principal",
  portfolios:{
    "Principal":{
      year:2026,
      start:1000,
      target:2000,
      data:{}
    }
  }
};

function current(){ return state.portfolios[state.active]; }
function save(){ localStorage.setItem("vertexApp", JSON.stringify(state)); }

/* TABS */
function buildTabs(){
  let tabs=document.getElementById("tabs");
  tabs.innerHTML="";

  Object.keys(state.portfolios).forEach(name=>{
    let tab=document.createElement("div");
    tab.className="tab";
    if(name===state.active) tab.classList.add("active-tab");

    tab.innerText=name;

    tab.onclick=()=>{
      state.active=name;
      save();
      render();
    };

    tabs.appendChild(tab);
  });
}

/* CALENDARIO */
const months=["enero","febrero","marzo","abril","mayo","junio",
"julio","agosto","septiembre","octubre","noviembre","diciembre"];

function buildCalendar(){
  let cal=document.getElementById("calendar");
  cal.innerHTML="";

  let p=current();
  document.getElementById("title").innerText=p.year;

  months.forEach((month,m)=>{

    let box=document.createElement("div");
    box.className="month";

    let title=document.createElement("div");
    title.className="month-title";
    title.innerText=month;
    box.appendChild(title);

    let grid=document.createElement("div");
    grid.className="grid";

    let first=(new Date(p.year,m,1).getDay()+6)%7;
    let daysInMonth=new Date(p.year,m+1,0).getDate();

    let arr=[];
    for(let i=0;i<first;i++) arr.push("");
    for(let d=1;d<=daysInMonth;d++) arr.push(d);
    while(arr.length%7!==0) arr.push("");

    for(let i=0;i<arr.length;i+=7){
      let week=arr.slice(i,i+7);

      week.forEach(d=>{
        let cell=document.createElement("div");
        cell.className="cell";

        if(d){
          cell.innerText=d;
          let date=new Date(p.year,m,d);

          if(date.getDay()===5){ // viernes

            cell.classList.add("friday");

            let key=`${m+1}-${d}`;

            if(p.data[key]){
              cell.innerHTML=d+"<br>"+p.data[key];
            }

            cell.onclick=()=>{
              let val=prompt("Capital:",p.data[key]||"");
              if(val){
                p.data[key]=parseFloat(val);
                save();
                render();
              }
            };
          }
        }

        grid.appendChild(cell);
      });

      let cap=document.createElement("div");
      cap.className="cell";

      let friday=week.find(d=>{
        if(!d) return false;
        return new Date(p.year,m,d).getDay()===5;
      });

      if(friday){
        let key=`${m+1}-${friday}`;
        if(p.data[key]) cap.innerText=p.data[key];
      }

      grid.appendChild(cap);
    }

    box.appendChild(grid);
    cal.appendChild(box);
  });
}

/* 🔥 GRAFICA CORRECTA */
function buildChart(){

  let p = current();

  let labels = [];
  let values = [];

  let last = Number(p.start) || 0;

  for(let m=0;m<12;m++){
    let days=new Date(p.year,m+1,0).getDate();

    for(let d=1;d<=days;d++){

      let date=new Date(p.year,m,d);

      if(date.getDay()===5){ // viernes

        let key=`${m+1}-${d}`;

        if(p.data[key] !== undefined && !isNaN(p.data[key])){
          last = Number(p.data[key]);
        }

        labels.push(`${m+1}/${d}`);
        values.push(last);
      }
    }
  }

  if(values.length === 0){
    labels = ["Inicio"];
    values = [last];
  }

  let ctx=document.getElementById("chart").getContext("2d");

  if(window.chart) window.chart.destroy();

  window.chart=new Chart(ctx,{
    type:"line",
    data:{
      labels:labels,
      datasets:[{
        label:"Capital",
        data:values,
        borderColor:"#4da3ff",
        borderWidth:2,
        tension:0.2
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      animation:false,
      scales:{
        y:{
          min:Number(p.start) || 0,
          max:Number(p.target) || (last+100),
          ticks:{
            callback:value => value + " €"
          }
        }
      }
    }
  });
}

/* CONFIG */
function settings(){
  let p=current();
  let start=prompt("Capital inicial:",p.start);
  let target=prompt("Objetivo:",p.target);

  if(start) p.start=parseFloat(start);
  if(target) p.target=parseFloat(target);

  save();
  render();
}

/* RENDER */
function render(){
  buildTabs();
  buildCalendar();
  buildChart();
}

render();
</script>

</body>
</html>
