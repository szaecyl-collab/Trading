<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Trading PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body { font-family: Arial; text-align: center; }
.topbar { margin: 10px; }
.calendar { display: grid; grid-template-columns: repeat(7,1fr); gap:3px; max-width:800px; margin:auto;}
.day { border:1px solid #ccc; padding:8px; }
.friday { background:#d0ebff; cursor:pointer; }
.header { font-weight:bold; }
</style>
</head>
<body>

<h2 id="title">Trading</h2>

<div class="topbar">
<button onclick="openSettings()">⚙️ Configuración</button>
<button onclick="addPortfolio()">➕ Nueva cartera</button>
<button onclick="window.print()">🖨️ Imprimir</button>
</div>

<div id="calendar"></div>

<h3>Equity</h3>
<canvas id="chart"></canvas>

<script>
let state = JSON.parse(localStorage.getItem("appState")) || {
    active: "default",
    portfolios: {
        "default": {
            year: 2026,
            start: 1000,
            target: 5000,
            data: {}
        }
    }
};

function getCurrent() {
    return state.portfolios[state.active];
}

function save() {
    localStorage.setItem("appState", JSON.stringify(state));
}

function generateCalendar() {
    let cal = document.getElementById("calendar");
    cal.innerHTML = "";

    let p = getCurrent();
    document.getElementById("title").innerText = state.active + " ("+p.year+")";

    let days = ["L","M","X","J","V","S","D"];
    days.forEach(d=>{
        let h=document.createElement("div");
        h.className="header";
        h.innerText=d;
        cal.appendChild(h);
    });

    let date = new Date(p.year,0,1);
    let startDay = (date.getDay()+6)%7;

    for(let i=0;i<startDay;i++){
        cal.appendChild(document.createElement("div"));
    }

    for(let m=0;m<12;m++){
        let daysInMonth=new Date(p.year,m+1,0).getDate();

        for(let d=1;d<=daysInMonth;d++){
            let dayDiv=document.createElement("div");
            dayDiv.className="day";

            let currentDate=new Date(p.year,m,d);
            let key=`${m+1}-${d}`;

            dayDiv.innerHTML=d;

            if(currentDate.getDay()===5){
                dayDiv.classList.add("friday");

                if(p.data[key]){
                    dayDiv.innerHTML+=`<br>${p.data[key]}€`;
                }

                dayDiv.onclick=()=>{
                    let val=prompt("Capital:",p.data[key]||"");
                    if(val){
                        p.data[key]=parseFloat(val);
                        save();
                        render();
                    }
                };
            }

            cal.appendChild(dayDiv);
        }
    }
}

function buildChart(){
    let p=getCurrent();
    let labels=[];
    let values=[];

    let last=p.start;

    for(let m=1;m<=12;m++){
        for(let d=1;d<=31;d++){
            let key=`${m}-${d}`;
            if(p.data[key]) last=p.data[key];
            labels.push(`${m}/${d}`);
            values.push(last);
        }
    }

    if(window.chart) window.chart.destroy();

    window.chart=new Chart(document.getElementById("chart"),{
        type:'line',
        data:{
            labels:labels,
            datasets:[
                {label:'Equity',data:values,fill:false},
                {label:'Objetivo',data:Array(values.length).fill(p.target),borderDash:[5,5]}
            ]
        }
    });
}

function openSettings(){
    let p=getCurrent();

    let year=prompt("Año:",p.year);
    let start=prompt("Capital inicial:",p.start);
    let target=prompt("Objetivo:",p.target);

    if(year) p.year=parseInt(year);
    if(start) p.start=parseFloat(start);
    if(target) p.target=parseFloat(target);

    save();
    render();
}

function addPortfolio(){
    let name=prompt("Nombre cartera:");
    if(!name) return;

    state.portfolios[name]={
        year:2026,
        start:1000,
        target:5000,
        data:{}
    };

    state.active=name;
    save();
    render();
}

function render(){
    generateCalendar();
    buildChart();
}

render();
</script>

</body>
</html>
